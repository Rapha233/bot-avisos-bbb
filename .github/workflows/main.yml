# Nome do nosso fluxo de trabalho
name: Aviso BBB - 10 Minutos

# Gatilho: Como e quando essa ação vai rodar
on:
  schedule:
    # Isso usa a sintaxe "cron" para agendamento.
    # O formato é: Minuto Hora Dia-do-Mês Mês Dia-da-Semana
    # '20 22 * * 2,4,5,6,0' significa: às 22:20 de Terça, Quinta, Sexta, Sábado e Domingo.
    # ATENÇÃO: O horário é UTC (3 horas a mais que o de Brasília).
    # Se o BBB começa 22:30 (Brasília), o aviso de 10 min (22:20) deve ser às 01:20 UTC.
    # Então, o cron para 22:20 (Brasília) seria: '20 1 * * 3,5,6,0,1' (Quarta, Sábado, Domingo, Segunda)
    # Ajuste os dias e horários conforme a programação do BBB!
    - cron: '20 1 * * *' # Exemplo: Todo dia às 01:20 UTC (22:20 Brasília)

# Tarefas: O que a ação vai fazer
jobs:
  enviar-aviso:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensagem para o Discord
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "Atenção! O BBB vai começar em 10 minutos! :eye:"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
