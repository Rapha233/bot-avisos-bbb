name: Manual - Aviso 30 Minutos

on:
  workflow_dispatch:

jobs:
  enviar-aviso:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensagem para o Discord
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "🍿 **Preparem a pipoca!** Faltam 30 minutos para o BBB começar!"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
