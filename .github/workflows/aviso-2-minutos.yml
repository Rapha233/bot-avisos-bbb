name: Manual - Aviso 2 Minutos

on:
  workflow_dispatch:

jobs:
  enviar-aviso:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensagem para o Discord
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "🔥🔥🔥 **TÁ CHEGANDO!** 2 minutinhos!"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
