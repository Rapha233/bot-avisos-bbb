name: Aviso BBB - Começou

on:
  schedule:
    # Roda às 01:59 UTC (22:59 de Brasília)
    - cron: '59 1 * * *'

jobs:
  enviar-aviso:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensagem para o Discord
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "📺 **COMEÇOU! CORRE PRA TV QUE O BBB TÁ NO AR!**"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
