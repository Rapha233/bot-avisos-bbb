name: Manual - Aviso Começou

on:
  workflow_dispatch:

jobs:
  enviar-aviso:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensagem para o Discord
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "📺 **O BBB ACABOU! MAS VOCÊ AINDA PODE CONTINUAR ASSISTINDO A NOSSA MANIPULAÇÃO AI VIVO NO MANIPULAPLAY! O QUE MAIS TEMOS É TROXA SEM CÉREBRO QUE ACREDITA EM TUDO QUE A GENTE MOSTRA, JUNTE-SE A ELES!**"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
