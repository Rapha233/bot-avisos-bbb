name: Manual - Aviso 1 Hora

on:
  workflow_dispatch:

jobs:
  enviar-aviso:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensagem para o Discord
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "📢 **ESQUENTA BBB!** Falta 1 hora para começar! Já vai se preparando!"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
